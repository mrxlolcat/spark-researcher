<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc" font-family="'Sora', -apple-system, BlinkMacSystemFont, sans-serif">
  <title id="title">Spark Domain Chip Boundary</title>
  <desc id="desc">The Spark Researcher kernel on the left and the external domain chip repo on the right, connected by a hook I/O bridge.</desc>

  <rect width="1280" height="820" fill="#0E1018"/>

  <text x="64" y="80" fill="#F4F2EE" font-size="32" font-weight="600" letter-spacing="-0.3">Domain chip boundary</text>
  <text x="64" y="112" fill="#D6D9E8" font-size="17" font-weight="400">The kernel stays generic. The chip carries domain or task-specific intelligence in a separate repo.</text>

  <text x="64" y="145" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="500" letter-spacing="0.5">
    <tspan fill="#506070">/</tspan><tspan fill="#5CC2B4">spark</tspan><tspan fill="#506070"> · </tspan><tspan fill="#D6D9E8">architecture</tspan>
  </text>

  <!-- LEFT PANEL: kernel -->
  <g>
    <rect x="64" y="190" width="540" height="540" rx="8" fill="#141820" stroke="#222430" stroke-width="1"/>

    <text x="92" y="232" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" letter-spacing="0.5">
      <tspan fill="#506070">/</tspan><tspan fill="#D6D9E8">kernel</tspan>
    </text>
    <text x="92" y="268" fill="#F4F2EE" font-size="22" font-weight="600">Spark Researcher kernel</text>
    <text x="92" y="296" fill="#D6D9E8" font-size="14">Owns the reusable runtime and the reviewable system surfaces.</text>

    <line x1="92" y1="324" x2="576" y2="324" stroke="#222430" stroke-width="1"/>

    <text x="92" y="356" fill="#7A82A8" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" letter-spacing="0.8">KERNEL OWNS</text>

    <g fill="#D6D9E8" font-size="15">
      <text x="92" y="394">— loop execution</text>
      <text x="92" y="424">— run workspaces</text>
      <text x="92" y="454">— metric parsing and ledger writes</text>
      <text x="92" y="484">— frontier queue</text>
      <text x="92" y="514">— memory index and packet search</text>
      <text x="92" y="544">— Obsidian vault root</text>
      <text x="92" y="574">— self-edit policy and apply path</text>
      <text x="92" y="604">— collective export plumbing</text>
    </g>

    <rect x="92" y="638" width="484" height="68" rx="6" fill="#1A1E28" stroke="#222430" stroke-width="1"/>
    <text x="112" y="668" fill="#F4F2EE" font-size="15" font-weight="600">Hook I/O bridge</text>
    <text x="112" y="690" fill="#D6D9E8" font-family="'JetBrains Mono', monospace" font-size="12">JSON in  ·  JSON out</text>
  </g>

  <!-- ARROW between panels -->
  <g>
    <line x1="620" y1="672" x2="660" y2="672" stroke="#5CC2B4" stroke-width="1.5"/>
    <polygon points="660,667 670,672 660,677" fill="#5CC2B4"/>
  </g>

  <!-- RIGHT PANEL: chip -->
  <g>
    <rect x="676" y="190" width="540" height="540" rx="8" fill="#141820" stroke="#5CC2B4" stroke-width="1.5"/>

    <text x="704" y="232" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" letter-spacing="0.5">
      <tspan fill="#506070">/</tspan><tspan fill="#5CC2B4">chip</tspan>
    </text>
    <text x="704" y="268" fill="#F4F2EE" font-size="22" font-weight="600">External domain chip repo</text>
    <text x="704" y="296" fill="#D6D9E8" font-size="14">Owns task-specific logic that should not bloat the kernel.</text>

    <line x1="704" y1="324" x2="1188" y2="324" stroke="#222430" stroke-width="1"/>

    <text x="704" y="356" fill="#7A82A8" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" letter-spacing="0.8">CHIP OWNS</text>

    <g fill="#D6D9E8" font-size="15">
      <text x="704" y="394">— <tspan font-family="'JetBrains Mono', monospace" fill="#5CC2B4">evaluate</tspan></text>
      <text x="704" y="424">— <tspan font-family="'JetBrains Mono', monospace" fill="#5CC2B4">suggest</tspan></text>
      <text x="704" y="454">— <tspan font-family="'JetBrains Mono', monospace" fill="#5CC2B4">packets</tspan></text>
      <text x="704" y="484">— <tspan font-family="'JetBrains Mono', monospace" fill="#5CC2B4">watchtower</tspan></text>
      <text x="704" y="514">— domain docs and specs</text>
      <text x="704" y="544">— domain tests</text>
      <text x="704" y="574">— collective identity in <tspan font-family="'JetBrains Mono', monospace" fill="#5CC2B4">AUTORESEARCH.md</tspan></text>
      <text x="704" y="604">— mutation grammar and promotion rules</text>
    </g>

    <rect x="704" y="638" width="484" height="68" rx="6" fill="#1A1E28" stroke="#222430" stroke-width="1"/>
    <text x="724" y="668" fill="#F4F2EE" font-size="15" font-weight="600">Separate repo</text>
    <text x="724" y="690" fill="#D6D9E8" font-family="'JetBrains Mono', monospace" font-size="12">domain-chip-* sibling</text>
  </g>

  <text x="64" y="780" fill="#5CC2B4" font-size="14" font-weight="600">Key idea</text>
  <text x="140" y="780" fill="#D6D9E8" font-size="14">If the task has a run surface, a score surface, and a mutation surface, the chip can modularize it while Spark stays generic.</text>
</svg>
