<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc" font-family="'Sora', -apple-system, BlinkMacSystemFont, sans-serif">
  <title id="title">What Spark Can Improve</title>
  <desc id="desc">Spark Researcher in the center with eight spokes to surfaces it can improve, plus the three conditions for self-improvement loops.</desc>

  <rect width="1280" height="820" fill="#0E1018"/>

  <text x="64" y="80" fill="#F4F2EE" font-size="32" font-weight="600" letter-spacing="-0.3">What Spark can improve</text>
  <text x="64" y="112" fill="#D6D9E8" font-size="17" font-weight="400">Spark is a general self-improvement runtime when the task can be run, scored, and mutated in a bounded way.</text>

  <text x="64" y="145" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="500" letter-spacing="0.5">
    <tspan fill="#506070">/</tspan><tspan fill="#5CC2B4">spark</tspan><tspan fill="#506070"> · </tspan><tspan fill="#D6D9E8">surfaces</tspan>
  </text>

  <!-- Spokes from center card perimeter to nearest target card edge -->
  <g stroke="#2A3050" stroke-width="1" fill="none">
    <line x1="540" y1="360" x2="320" y2="292"/>
    <line x1="600" y1="360" x2="490" y2="232"/>
    <line x1="680" y1="360" x2="790" y2="232"/>
    <line x1="740" y1="360" x2="960" y2="292"/>
    <line x1="540" y1="480" x2="320" y2="560"/>
    <line x1="600" y1="480" x2="490" y2="620"/>
    <line x1="680" y1="480" x2="790" y2="620"/>
    <line x1="740" y1="480" x2="960" y2="560"/>
  </g>

  <g>
    <rect x="490" y="360" width="300" height="120" rx="6" fill="#1A1E28" stroke="#5CC2B4" stroke-width="1.5"/>
    <text x="510" y="390" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" letter-spacing="0.5">
      <tspan fill="#506070">/</tspan><tspan fill="#5CC2B4">spark</tspan>
    </text>
    <text x="510" y="424" fill="#F4F2EE" font-size="22" font-weight="600">Spark Researcher</text>
    <text x="510" y="452" fill="#D6D9E8" font-size="14" font-weight="400">Generic kernel for bounded</text>
    <text x="510" y="470" fill="#D6D9E8" font-size="14" font-weight="400">self-improving loops</text>
  </g>

  <g>
    <rect x="80" y="200" width="240" height="92" rx="6" fill="#141820" stroke="#222430" stroke-width="1"/>
    <text x="100" y="232" fill="#F4F2EE" font-size="17" font-weight="600">Research</text>
    <text x="100" y="262" fill="#D6D9E8" font-size="14">Sources, packets, doctrine</text>
  </g>

  <g>
    <rect x="370" y="140" width="240" height="92" rx="6" fill="#141820" stroke="#222430" stroke-width="1"/>
    <text x="390" y="172" fill="#F4F2EE" font-size="17" font-weight="600">Prompts</text>
    <text x="390" y="202" fill="#D6D9E8" font-size="14">Variants, evals, retries</text>
  </g>

  <g>
    <rect x="670" y="140" width="240" height="92" rx="6" fill="#141820" stroke="#222430" stroke-width="1"/>
    <text x="690" y="172" fill="#F4F2EE" font-size="17" font-weight="600">Coding tasks</text>
    <text x="690" y="202" fill="#D6D9E8" font-size="14">Diffs, tests, review loops</text>
  </g>

  <g>
    <rect x="960" y="200" width="240" height="92" rx="6" fill="#141820" stroke="#222430" stroke-width="1"/>
    <text x="980" y="232" fill="#F4F2EE" font-size="17" font-weight="600">Browser workflows</text>
    <text x="980" y="262" fill="#D6D9E8" font-size="14">Task completion quality</text>
  </g>

  <g>
    <rect x="80" y="560" width="240" height="92" rx="6" fill="#141820" stroke="#222430" stroke-width="1"/>
    <text x="100" y="592" fill="#F4F2EE" font-size="17" font-weight="600">API tools</text>
    <text x="100" y="622" fill="#D6D9E8" font-size="14">Calls, payloads, usefulness</text>
  </g>

  <g>
    <rect x="370" y="620" width="240" height="92" rx="6" fill="#141820" stroke="#222430" stroke-width="1"/>
    <text x="390" y="652" fill="#F4F2EE" font-size="17" font-weight="600">Content systems</text>
    <text x="390" y="682" fill="#D6D9E8" font-size="14">Hooks, reach, quality</text>
  </g>

  <g>
    <rect x="670" y="620" width="240" height="92" rx="6" fill="#141820" stroke="#222430" stroke-width="1"/>
    <text x="690" y="652" fill="#F4F2EE" font-size="17" font-weight="600">Trading / strategy</text>
    <text x="690" y="682" fill="#D6D9E8" font-size="14">Signals, risk, outcomes</text>
  </g>

  <g>
    <rect x="960" y="560" width="240" height="92" rx="6" fill="#141820" stroke="#222430" stroke-width="1"/>
    <text x="980" y="592" fill="#F4F2EE" font-size="17" font-weight="600">Internal tools</text>
    <text x="980" y="622" fill="#D6D9E8" font-size="14">Usage and task quality</text>
  </g>

  <g>
    <rect x="64" y="754" width="1152" height="44" rx="6" fill="#141820" stroke="#5CC2B4" stroke-width="1" stroke-opacity="0.35"/>
    <text x="84" y="782" fill="#5CC2B4" font-size="14" font-weight="600">Spark fits when all three exist</text>
    <text x="370" y="782" fill="#D6D9E8" font-size="14">1. runnable surface  ·  2. measurable score  ·  3. bounded mutation space</text>
  </g>
</svg>
